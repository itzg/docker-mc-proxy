name: Issues notify

on:
  issues:
    types:
      - opened
      - labeled
      - unlabeled
      - closed
  pull_request_target:
    types:
      - closed

jobs:
  notify:
    if: secrets.DISCORD_ISSUES_WEBHOOK
    uses: itzg/github-workflows/.github/workflows/issues-notify-discord.yml@main
    secrets:
      discordWebhook: "${{secrets.DISCORD_ISSUES_WEBHOOK}}"
